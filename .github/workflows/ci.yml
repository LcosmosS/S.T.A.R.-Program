name: S.T.A.R. CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: pip install -e .

      - name: Verify environment
        run: |
          python3 --version

      - name: Run tests
        run: pytest -q
