name: S.T.A.R. CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.11"
        environment-file: environment.yml
        activate-environment: star-env
        channels: conda-forge

    - name: Verify environment
      run: |
        which python
        python --version
        which pytest || echo "pytest not found"

    - name: Run tests
      shell: bash -l {0}
      run: pytest -q


    - name: Install joblib
      run: conda install -y joblib

    - name: Install SageMath
      run: conda install -y sage

    - name: Check installed packages
      shell: bash -l {0}
      run: |
        conda list
        pip list

    - name: Add src to PYTHONPATH
      shell: bash -l {0}
      run: |
        export PYTHONPATH="$PYTHONPATH:$(pwd)/src"
        echo "PYTHONPATH=$PYTHONPATH"

    - name: Run tests
      shell: bash -l {0}
      env:
        PYTHONPATH: "${{ github.workspace }}/src"
      run: pytest -q

    - name: Prepare small subset of labels
      run: |
        head -n 21 data/raw/curve_labels.csv > data/raw/ci_subset.csv

    - name: Run dataset builder on CI subset
      run: |
        sage -python scripts/build_ec_dataset_parallel.sage \
          --labels-file cremona_raw_parsed.csv \
          --labels-file lmfdb_raw_parsed.csv \
          --output results/ci_ec_subset.csv \
          --workers 2 \
          --batch-size 10

    - name: Upload CI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ci-results
        path: results/
