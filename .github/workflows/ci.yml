name: S.T.A.R. CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.11"
        environment-file: environment.yml
        activate-environment: star-env
        channels: conda-forge

    - name: Install joblib
      shell: bash -l {0}
      run: conda install -y joblib

    - name: Clone Cremona and LMFDB archives
      shell: bash -l {0}
      run: |
        mkdir -p external
        git clone https://github.com/JohnCremona/ecdata.git external/ecdata || true
        git clone https://github.com/JohnCremona/eclib.git external/eclib || true
        git clone https://github.com/LMFDB/lmfdb.git external/lmfdb || true

    - name: Install eclib + LMFDB
      shell: bash -l {0}
      run: |
        pip install external/eclib || true
        pip install external/lmfdb || true

    - name: Install SageMath
      shell: bash -l {0}
      run: conda install -y sage

    - name: Add src to PYTHONPATH (persistent)
      shell: bash -l {0}
      run: |
        echo "PYTHONPATH=${PYTHONPATH}:${GITHUB_WORKSPACE}/src" >> $GITHUB_ENV

    - name: Verify environment
      shell: bash -l {0}
      run: |
        which python
        python --version
        which pytest || echo "pytest not found"
        echo "PYTHONPATH=$PYTHONPATH"

    - name: Run tests
      shell: bash -l {0}
      run: pytest -q

    - name: Generate CI subset of ≥1000 Cremona labels
      shell: bash -l {0}
      run: |
        mkdir -p data/raw
        echo "label" > data/raw/ci_subset.csv
        sage -python - <<EOF >> data/raw/ci_subset.csv
from sageall import CremonaDatabase

db = CremonaDatabase()
labels = []

for N in range(1, 5000):
    curves = db.curves(N)
    for L in curves:
        labels.append(L)
        if len(labels) >= 1000:
            break
    if len(labels) >= 1000:
        break

for L in labels[:1000]:
    print(L)
EOF

    - name: Run dataset builder on CI subset
      shell: bash -l {0}
      run: |
        sage -python scripts/build_ec_dataset_parallel.sage \
          --labels-file data/raw/ci_subset.csv \
          --output results/ci_ec_subset.csv \
          --workers 2 \
          --batch-size 10

    - name: Upload CI artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ci-results
        path: results/
