name: S.T.A.R. CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: python3 -m pip install -e ".[dev]"

      - name: Install package and TDA extras
        run: python3 -m pip install -e ".[dev,tda]"
        
      - name: Run tests
        run: python3 -m pytest -q
