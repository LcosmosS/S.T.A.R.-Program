name: Sky Survey Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect project root
      id: root
      run: |
        echo "Searching for project root inside $GITHUB_WORKSPACE..."
        ROOT=$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type d -name src -printf '%h\n' | head -n 1)
        echo "ROOT=$ROOT" >> $GITHUB_OUTPUT
        echo "Detected project root: $ROOT"

    - name: Install dependencies
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install -r requirements.txt

    - name: Install parquet engine
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install pyarrow

    - name: Install package
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install -e .

    - name: Verify working directory
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        pwd
        ls -al

    - name: Validate committed Pantheon+ dataset
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        # Prefer the importable module if present, otherwise check CSV
        if [ -f src/likelihoods/data/pantheon_plus.py ]; then
          sage -python - <<'PY'
        import importlib, sys
        try:
            m = importlib.import_module('src.likelihoods.data.pantheon_plus')
        except Exception as e:
            print("Failed to import committed pantheon module:", e, file=sys.stderr); sys.exit(3)
        d = getattr(m, 'PANTHEON_PLUS_FULL', None)
        if not isinstance(d, dict):
            print("PANTHEON_PLUS_FULL is not a dict", file=sys.stderr); sys.exit(4)
        for k in ('z','mu','sigma_mu'):
            if k not in d:
                print(f"Missing key {k} in PANTHEON_PLUS_FULL", file=sys.stderr); sys.exit(5)
        if len(d['z']) < 10:
            print("ERROR: PANTHEON_PLUS_FULL contains fewer than 10 SNe; check committed data", file=sys.stderr); sys.exit(6)
        for i, val in enumerate(d['z'][:20]):
            if not isinstance(val, (int,float)):
                print('Non-numeric z at index', i, val, file=sys.stderr); sys.exit(7)
        print('Pantheon+ module OK: {} SNe'.format(len(d['z'])))
        PY
                elif [ -f data/processed/pantheon_plus.csv ]; then
                  sage -python - <<'PY'
        import pandas as pd, sys
        p = "data/processed/pantheon_plus.csv"
        try:
            df = pd.read_csv(p)
        except Exception as e:
            print("Failed to read CSV:", e, file=sys.stderr); sys.exit(3)
        if not set(['z','mu','sigma_mu']).issubset(df.columns):
            print("CSV missing required columns", file=sys.stderr); sys.exit(4)
        for c in ['z','mu','sigma_mu']:
            df[c] = pd.to_numeric(df[c], errors='coerce')
        df = df.dropna()
        if len(df) < 10:
            print("CSV contains too few valid rows", file=sys.stderr); sys.exit(5)
        print("Pantheon+ CSV OK:", len(df))
        PY
        else
          echo "ERROR: No committed Pantheon+ module or CSV found." >&2
          exit 2
        fi

    - name: Check generated module for ellipses
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        FILE=src/likelihoods/data/pantheon_plus.py
        if grep -nE '\.\.\.|Ellipsis' "$FILE"; then
          echo "ERROR: Generated module contains '...' or 'Ellipsis' tokens. Inspect $FILE" >&2
          sed -n '1,200p' "$FILE" >&2
          exit 1
        fi
        echo "No ellipses found in $FILE"

    - name: Validate sky survey loader
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pytest -q src/tests/test_load_sky_surveys.py

    - name: Run dataset builder (downsampled)
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python - <<'EOF'
        from src.data.sky_survey_dataset_builder import SkySurveyDatasetBuilder
        builder = SkySurveyDatasetBuilder(downsample=200)
        builder.save("sky_surveys_ci.parquet")
        EOF
