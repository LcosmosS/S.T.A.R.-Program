name: Sky Survey Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect project root
      id: root
      run: |
        echo "Searching for project root inside $GITHUB_WORKSPACE..."
        ROOT=$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type d -name src -printf '%h\n' | head -n 1)
        echo "ROOT=$ROOT" >> $GITHUB_OUTPUT
        echo "Detected project root: $ROOT"

    - name: Install dependencies
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install -r requirements.txt

    - name: Install parquet engine
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install pyarrow

    - name: Install package
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pip install -e .

    - name: Verify working directory
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        pwd
        ls -al

        - name: Regenerate Pantheon+ dataset
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        # Ensure the raw file exists (fail fast with a clear message)
        if [ ! -f data/raw/pantheon_plus.dat ]; then
          echo "ERROR: data/raw/pantheon_plus.dat not found. Place the Pantheon+ .dat file in data/raw/ or commit the generated module." >&2
          exit 2
        fi

        # Run regeneration using the same interpreter used for installs
        sage -python scripts/regenerate_pantheon_module.py

        # Quick runtime validation of the generated module
        sage -python - <<'PY'
        import importlib, sys
        try:
            m = importlib.import_module('src.likelihoods.data.pantheon_plus')
        except Exception as e:
            print("Failed to import generated pantheon module:", e, file=sys.stderr)
            sys.exit(3)

        d = getattr(m, 'PANTHEON_PLUS_FULL', None)
        if not isinstance(d, dict):
            print("PANTHEON_PLUS_FULL is not a dict", file=sys.stderr); sys.exit(4)
        for k in ('z','mu','sigma_mu'):
            if k not in d:
                print(f"Missing key {k} in PANTHEON_PLUS_FULL", file=sys.stderr); sys.exit(5)
        if len(d['z']) < 10:
            print("Warning: PANTHEON_PLUS_FULL contains fewer than 10 SNe; check data/raw/pantheon_plus.dat", file=sys.stderr)
        # Check numeric types for first 20 entries
        for i, val in enumerate(d['z'][:20]):
            if not isinstance(val, (int,float)):
                print('Non-numeric z at index', i, val, file=sys.stderr); sys.exit(6)
        print('Pantheon+ dataset OK: {} SNe'.format(len(d['z'])))
        PY

    
    - name: Validate sky survey loader
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python -m pytest -q src/tests/test_load_sky_surveys.py

    - name: Run dataset builder (downsampled)
      run: |
        cd "${{ steps.root.outputs.ROOT }}"
        sage -python - << 'EOF'
        from src.data.sky_survey_dataset_builder import SkySurveyDatasetBuilder
        builder = SkySurveyDatasetBuilder(downsample=200)
        builder.save("sky_surveys_ci.parquet")
        EOF

    - name: Regenerate Pantheon+ dataset
      run: |
        python scripts/regenerate_pantheon_module.py
        python - <<'PY'
        import importlib, sys
        m = importlib.import_module('src.likelihoods.data.pantheon_plus')
        d = m.PANTHEON_PLUS_FULL
        assert isinstance(d, dict) and all(k in d for k in ('z','mu','sigma_mu'))
        assert all(isinstance(x, (int,float)) for x in d['z'][:10])
        print('Pantheon+ dataset OK')
        PY

