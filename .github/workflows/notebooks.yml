name: Notebook Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive   # ← Important: pulls ecdata, eclib, lmfdb

      - name: Install system tools
        run: |
          apt-get update
          apt-get install -y git curl pandoc \
            texlive texlive-latex-extra texlive-xetex

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          sage -python -m pip install --upgrade pip setuptools wheel
          sage -python -m pip install --no-cache-dir \
            numpy pandas tqdm scikit-learn plotly==5.18.0 \
            corner ripser persim nbconvert nbclient ipykernel nest_asyncio

      - name: Prepare IPython runtime
        run: |
          export IPYTHONDIR=/tmp/.ipython
          mkdir -p "$IPYTHONDIR"
          chmod -R 0777 "$IPYTHONDIR"
          echo "IPYTHONDIR=$IPYTHONDIR" >> $GITHUB_ENV

      - name: Verify submodules
        run: |
          echo "=== Submodules Status ==="
          ls -la data/ecdata data/eclib data/lmfdb 2>/dev/null || echo "Some submodules missing"
          echo "ecdata files:" $(find data/ecdata -name "*.txt" | wc -l)
          echo "eclib files:"  $(find data/eclib  -name "*.txt" | wc -l)

      - name: Clear Python cache
        run: rm -rf __pycache__ */__pycache__ */*/__pycache__

      - name: Execute notebooks
        run: |
          mkdir -p results exports
          for nb in examples/*.ipynb; do
            echo "Running $nb"
            sage -python -m jupyter nbconvert \
              --to notebook \
              --execute "$nb" \
              --output "$(basename $nb .ipynb)-executed.ipynb" \
              --ExecutePreprocessor.timeout=2400
          done

      - name: Export HTML and PDF
        run: |
          mkdir -p exports
          for nb in examples/*-executed.ipynb; do
            base=$(basename "$nb" .ipynb)
            echo "Exporting $nb"
            sage -python -m jupyter nbconvert --to html "$nb" --output-dir exports --output "${base}.html"
            sage -python -m jupyter nbconvert --to pdf  "$nb" --output-dir exports --output "${base}.pdf"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: notebook-outputs
          path: |
            results/
            examples/*-executed.ipynb
            exports/
