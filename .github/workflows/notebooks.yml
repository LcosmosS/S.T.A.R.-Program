name: Notebook Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      REPO_PATH: /__w/S.T.A.R.-Program/S.T.A.R.-Program

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Git and update submodules
        run: |
          apt-get update && apt-get install -y git
          git --version
          
          echo "Current directory: $(pwd)"
          echo "Expected repo path: $REPO_PATH"
          
          # Force correct directory
          cd $REPO_PATH
          git status
          
          echo "Updating submodules..."
          git submodule update --init --recursive --depth=1
          
          echo "=== Submodule Status ==="
          ls -la data/ecdata data/eclib data/lmfdb 2>/dev/null || echo "Submodules not found"
          echo "ecdata files:" $(find data/ecdata -type f | wc -l 2>/dev/null || echo 0)

      - name: Install system tools
        run: |
          apt-get update
          apt-get install -y pandoc texlive texlive-latex-extra texlive-xetex

      - name: Install Python dependencies
        run: |
          sage -python -m pip install --upgrade pip
          sage -python -m pip install --no-cache-dir \
            numpy pandas tqdm plotly==5.18.0 corner ripser persim \
            nbconvert nbclient ipykernel nest_asyncio

      - name: Clear Python cache
        run: rm -rf __pycache__ */__pycache__ */*/__pycache__

      - name: Execute notebooks
        run: |
          cd $REPO_PATH
          mkdir -p results exports
          for nb in examples/*.ipynb; do
            echo "Running $nb"
            sage -python -m jupyter nbconvert \
              --to notebook \
              --execute "$nb" \
              --output "$(basename $nb .ipynb)-executed.ipynb" \
              --ExecutePreprocessor.timeout=2400
          done

      - name: Export HTML and PDF
        run: |
          cd $REPO_PATH
          mkdir -p exports
          for nb in examples/*-executed.ipynb; do
            base=$(basename "$nb" .ipynb)
            sage -python -m jupyter nbconvert --to html "$nb" --output-dir exports --output "${base}.html"
            sage -python -m jupyter nbconvert --to pdf  "$nb" --output-dir exports --output "${base}.pdf"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: notebook-outputs
          path: |
            ${{ env.REPO_PATH }}/results/
            ${{ env.REPO_PATH }}/examples/*-executed.ipynb
            ${{ env.REPO_PATH }}/exports/
