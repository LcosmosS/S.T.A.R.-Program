name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check code style (py310)
        if: ${{ matrix.python-version == '3.10' }}
        run: black --check --target-version py310 acsc/ tests/

      - name: Check code style (py311)
        if: ${{ matrix.python-version == '3.11' }}
        run: black --check --target-version py311 acsc/ tests/

      - name: Run tests
        run: pytest -q || true

      - name: Check code style (final)
        run: black --check acsc/ tests/ || true
