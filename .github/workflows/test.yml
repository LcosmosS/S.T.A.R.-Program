- name: Install dependencies
  run: |
    cd Arithmetic-Cosmic-Structure-Conjecture-ACSC
    pip install -e ".[dev]"


on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          path: Arithmetic-Cosmic-Structure-Conjecture-ACSC

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: Arithmetic-Cosmic-Structure-Conjecture-ACSC

      - name: Run tests
        run: pytest tests/ --cov=acsc
        working-directory: Arithmetic-Cosmic-Structure-Conjecture-ACSC

      - name: Check code style
        run: black --check acsc/ tests/
        working-directory: Arithmetic-Cosmic-Structure-Conjecture-ACSC
