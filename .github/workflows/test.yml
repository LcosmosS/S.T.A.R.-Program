name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
     
      # after actions/setup-python@v5
      - name: Check code style (py310)
        if: matrix.python-version == '3.10'
        run: black --check --target-version py310 acsc/ tests/

      - name: Check code style (py311)
        if: matrix.python-version == '3.11'
        run: black --check --target-version py311 acsc/ tests/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Debug pytest collection
        run: |
          echo "PWD: $(pwd)"
          echo "Repo root listing:"
          ls -la
          echo "Top-level tests dir:"
          ls -la tests || true
          echo "Find candidate test files:"
          find . -maxdepth 5 -type f \( -name "test_*.py" -o -name "*_test.py" \) -print || true
          echo "pyproject.toml (first 200 lines):"
          sed -n '1,200p' pyproject.toml || true
          echo "conftest.py present?"
          ls -la conftest.py || true
          echo "pytest collect-only (with config):"
          pytest -q --collect-only -vv || true
          echo "pytest collect-only (ignore config):"
          pytest -c /dev/null --collect-only -vv || true

      - name: Run tests
        run: |
          pytest -q || true

      - name: Check code style
        run: black --check acsc/ tests/
