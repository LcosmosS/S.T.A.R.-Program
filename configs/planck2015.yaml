model:
  H_expr: "H0*sqrt(Ωm*(1+z)**3 + ΩΛ + a*z + b*z**2)"
  param_names: ["H0", "Ωm", "ΩΛ", "a", "b"]

priors:
  H0: [70, 2]
  Ωm: [0.3, 0.05]
  ΩΛ: [0.7, 0.05]
  a: [0, 0.02]
  b: [0, 0.02]

proposal_widths:
  H0: 0.1
  Ωm: 0.01
  ΩΛ: 0.01
  a: 0.002
  b: 0.002

datasets:
  planck: PLANCK_2015
  bao: DESI_BAO_DR1
  cc: COSMIC_CHRONOMETERS

mcmc:
  theta0: [70, 0.3, 0.7, 0, 0]
  nsteps: 8000

output_dir: "paper_figures_planck2015"
